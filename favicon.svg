<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>
    @media (prefers-color-scheme: dark) {
      text {
        fill: white;
      }
      polygon {
        stroke: white;
      }
    }
  </style>
  <!-- Hexagon -->
  <polygon
    points="100,10 180,55 180,145 100,190 20,145 20,55"
    fill="none"
    stroke="black"
    stroke-width="8"
  />
  <!-- Letter T -->
  <text
    x="100"
    y="150"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="120"
    fill="black"
    font-weight="bold"
  >T</text>
</svg>
